name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: drop2-x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: drop2-aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: drop2-x86_64-apple-darwin

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.88"
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - run: make receiver

      - run: cargo build --release --target ${{ matrix.target }} -p drop2-cli

      - name: Package binary
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/drop2" "dist/${{ matrix.artifact }}"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

  release:
    name: Publish
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
